name: Build & Push Docker image

on:
  push:
    branches: [master]
  # Позволяет запустить вручную из вкладки Actions
  workflow_dispatch:

env:
  # Меняй на своё: ghcr.io/<username>/barter-island
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/barter-island

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для push в ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # автоматический токен, настраивать не нужно

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # latest при каждом пуше в master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # тег по короткому SHA коммита: sha-a1b2c3d
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Кешируем слои между запусками через GitHub Actions cache
          cache-from: type=gha
          cache-to:   type=gha,mode=max
